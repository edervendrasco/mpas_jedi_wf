cost function:
  cost type: 3D-Var
  time window:
    begin: '#WINDATE#Z'
    length: PT6H
  geometry:
    nml_file: "./namelist.atmosphere"
    streams_file: "./streams.atmosphere"
    deallocate non-da fields: true
    interpolation type: unstructured
  analysis variables: &incvars
  - uReconstructZonal
  - uReconstructMeridional
  - temperature
  - spechum
  - surface_pressure
  - qc
  - qi
  - qr
  - qs
  - qg
  background:
    state variables: [temperature, spechum, uReconstructZonal, uReconstructMeridional, surface_pressure,
                      qc, qi, qr, qs, qg, theta, rho, u, qv, pressure, landmask, xice, snowc, skintemp,
                      ivgtyp, isltyp, snowh, znt, t2m, vegfra, u10, v10, lai, smois, tslb]
    filename: "./bg.#ANADATEp#.nc"
    date: &analysisdate '#ANADATE#Z'
  background error:
    covariance model: SABER
    saber central block:
      saber block name: BUMP_NICAS
      active variables: &ctlvars [stream_function,velocity_potential,temperature,spechum,surface_pressure,qc,qi,qr,qs,qg]
      read:
        io:
          data directory: ./B_Matrix/bump_nicas
          files prefix: mpas
        drivers:
          multivariate strategy: univariate
          read local nicas: true
        nicas:
          resolution: 4
          max horizontal grid size: 500000
        grids:
          - model:
              variables:
              - stream_function
              - velocity_potential
              - temperature
              - spechum
              - qc
              - qi
              - qr
              - qs
              - qg
          - model:
              variables:
              - surface_pressure
    saber outer blocks:
    - saber block name: StdDev
      read:
        model file:
          filename: ./B_Matrix/stddev/mpas.stddev.nc
          date: *analysisdate
          stream name: control
    - saber block name: BUMP_VerticalBalance
      read:
        io:
          data directory: ./B_Matrix/bump_vertical_balance
          files prefix: mpas
        drivers:
          read local sampling: true
          read vertical balance: true
        vertical balance:
          vbal:
          - balanced variable: velocity_potential
            unbalanced variable: stream_function
            diagonal regression: true
          - balanced variable: temperature
            unbalanced variable: stream_function
          - balanced variable: surface_pressure
            unbalanced variable: stream_function
    linear variable change:
      linear variable change name: Control2Analysis
      input variables: *ctlvars
      output variables: *incvars
  observations:
    observers:
    - obs space:
        name: Radiosonde
        obsdatain:
          engine:
            type: H5File
            obsfile: ./sondes_obs_#ANADATE#.h5
        obsdataout:
          engine:
            type: H5File
            obsfile: ./obsout_3dvar_sondes.h5
        simulated variables: [airTemperature, windEastward, windNorthward, specificHumidity]
      obs operator:
        name: VertInterp
        observation alias file: ./obsop_name_map.yaml
      obs error:
        covariance model: diagonal
      obs filters:
      - filter: PreQC
        maxvalue: 3
      - filter: Background Check
        threshold: 3
        apply at iterations: 0,1

    - obs space:
        name: Aircraft
        obsdatain:
          engine:
            type: H5File
            obsfile: ./aircraft_obs_#ANADATE#.h5
        obsdataout:
          engine:
            type: H5File
            obsfile: ./obsout_3dvar_aircraft.h5
        simulated variables: [airTemperature, windEastward, windNorthward, specificHumidity]
      obs operator:
        name: VertInterp
        observation alias file: ./obsop_name_map.yaml
      obs error:
        covariance model: diagonal
      obs filters:
      - filter: PreQC
        maxvalue: 3
      - filter: Background Check
        threshold: 3
        apply at iterations: 0,1

    - obs space:
        name: GnssroRefNCEP
        obsdatain:
          engine:
            type: H5File
            obsfile: ./gnssro_obs_#ANADATE#.h5
        obsdataout:
          engine:
            type: H5File
            obsfile: ./obsout_3dvar_gnssrorefncep.h5
        simulated variables: [atmosphericRefractivity]
      obs operator:
        name: GnssroRefNCEP
        obs options:
          use_compress: 0
      obs error:
        covariance model: diagonal
      obs filters:
      - filter: Domain Check
        where:
        - variable:
            name: MetaData/height
          minvalue: 0
          maxvalue: 30000
        - variable:
            name: MetaData/earthRadiusCurvature
          minvalue: 6250000
          maxvalue: 6450000
        - variable:
            name: MetaData/geoidUndulation
          minvalue: -200
          maxvalue: 200
      - filter: Background Check
        apply at iterations: 0,1
        threshold: 3
      - filter: ROobserror
        apply at iterations: 0,1
        variable: refractivity
        errmodel: NCEP

    - obs space:
        name: Surface T,Q,Ps
        obsdatain:
          engine:
            type: H5File
            obsfile: ./sfc_obs_#ANADATE#.h5
        obsdataout:
          engine:
            type: H5File
            obsfile: ./obsout_3dvar_sfc.h5
        simulated variables: [stationPressure, airTemperature, specificHumidity]
      obs operator:
        name: Composite
        components:
        - name: VertInterp
          vertical coordinate: height
          observation vertical coordinate: height
          interpolation method: linear
          variables:
          - name: airTemperature
          - name: specificHumidity
        - name: SfcPCorrected
          da_psfc_scheme: UKMO   # or WRFDA
          variables:
          - name: stationPressure
      linear obs operator:
        name: Composite
        components:
        - name: Identity
          variables:
          - name: airTemperature
          - name: specificHumidity
        - name: Identity
          variables:
          - name: stationPressure
      obs error:
        covariance model: diagonal
      obs filters:
      - filter: PreQC
        maxvalue: 3
      - filter: Difference Check
        apply at iterations: 0,1
        reference: MetaData/stationElevation
        value: GeoVaLs/surface_altitude
        threshold: 500
      - filter: Background Check
        apply at iterations: 0,1
        threshold: 10
      - filter: Perform Action
        filter variables:
        - name: airTemperature
        - name: specificHumidity
        action:
          name: passivate

    - obs space:
        name: Surface U,V
        obsdatain:
          engine:
            type: H5File
            obsfile: ./sfc_obs_#ANADATE#.h5
        obsdataout:
          engine:
            type: H5File
            obsfile: ./obsout_3dvar_sfc_wind.h5
        simulated variables: [windEastward, windNorthward]
      obs operator:
        name: VertInterp
        vertical coordinate: height
        observation vertical coordinate: height
        interpolation method: linear

        hofx scaling field: wind_reduction_factor_at_10m
        hofx scaling field group: GeoVaLs
        variables:
        - name: windEastward
        - name: windNorthward
      linear obs operator:
        name: Identity
        variables:
        - name: windEastward
        - name: windNorthward
      obs error:
        covariance model: diagonal
      obs filters:
      - filter: PreQC
        maxvalue: 3
      - filter: Difference Check
        apply at iterations: 0,1
        reference: MetaData/stationElevation
        value: GeoVaLs/surface_altitude
        threshold: 500
      - filter: Background Check
        apply at iterations: 0,1
        threshold: 10
      - filter: Perform Action
        filter variables:
        - name: windEastward
        - name: windNorthward
        action:
          name: passivate

      - filter: GOMsaver
        filename: ./geoval_out.nc

    - obs space:
        name: Satwind
        obsdatain:
          engine:
            type: H5File
            obsfile: ./satwind_obs_#ANADATE#.h5
        obsdataout:
          engine:
            type: H5File
            obsfile: ./obsout_3dvar_satwind.h5
        simulated variables: [windEastward, windNorthward]
      obs operator:
        name: VertInterp
        observation alias file: ./obsop_name_map.yaml
      obs error:
        covariance model: diagonal
      obs filters:
      - filter: PreQC
        maxvalue: 3
      - filter: Background Check
        apply at iterations: 0,1
        threshold: 3


    - obs space:
        name: Satwnd
        obsdatain:
          engine:
            type: H5File
            obsfile: ./satwnd_obs_#ANADATE#.h5
        obsdataout:
          engine:
            type: H5File
            obsfile: ./obsout_3dvar_satwnd.h5
        simulated variables: [windEastward, windNorthward]
      obs operator:
        name: VertInterp
        observation alias file: ./obsop_name_map.yaml
      obs error:
        covariance model: diagonal
      obs filters:
      - filter: PreQC
        maxvalue: 3
      - filter: Background Check
        apply at iterations: 0,1
        threshold: 3

    - obs space:
        name: ASCAT
        obsdatain:
          engine:
            type: H5File
            obsfile: ./ascat_obs_#ANADATE#.h5
        obsdataout:
          engine:
            type: H5File
            obsfile: ./obsout_3dvar_ascat.h5
        simulated variables: [windEastward, windNorthward]
      obs operator:
        name: VertInterp
        vertical coordinate: air_pressure
        observation vertical coordinate: pressure
        interpolation method: linear
        variables:
        - name: windEastward
        - name: windNorthward
      linear obs operator:
        name: Identity
        variables:
        - name: windEastward
        - name: windNorthward
      obs error:
        covariance model: diagonal
      obs filters:
      - filter: PreQC
        maxvalue: 3
      - filter: Domain Check
        where:
        - variable:
            name: MetaData/latitude
          minvalue: -90.0
          maxvalue: 90.0
        - variable:
            name: MetaData/longitude
          minvalue: -180.0
          maxvalue: 360.0
        - variable:
            name: MetaData/pressure
          minvalue: 10000.0
          maxvalue: 110000.0
      - filter: Background Check
        apply at iterations: 0,1
        threshold: 5

    - obs space:
        name: AMSUA-METOPB
        obsdatain:
          engine:
            type: H5File
            obsfile: ./amsua_metop-b_obs_#ANADATE#.h5
        obsdataout:
          engine:
            type: H5File
            obsfile: ./obsout_3dvar_amsua_metopb.h5
        simulated variables: [brightnessTemperature]
        channels: 5-14
      obs error:
        covariance model: diagonal
      obs filters:
      - filter: PreQC
        maxvalue: 3
      - filter: Domain Check
        where:
        - variable:
            name: MetaData/sensorZenithAngle
          maxvalue: 65.0
      - filter: Background Check
        apply at iterations: 0,1
        threshold: 10
      obs operator: &crtm_amsua_metopb
        name: CRTM
        Absorbers: [H2O,O3]
        SurfaceWindGeoVars: uv
        linear obs operator:
          Absorbers: [H2O]
        obs options:
          Sensor_ID: amsua_metop-b
          EndianType: little_endian
          CoefficientPath: ./crtm3/

    - obs space:
        name: AMSUA-METOPC
        obsdatain:
          engine:
            type: H5File
            obsfile: ./amsua_metop-c_obs_#ANADATE#.h5
        obsdataout:
          engine:
            type: H5File
            obsfile: ./obsout_3dvar_amsua_metopc.h5
        simulated variables: [brightnessTemperature]
        channels: 5-14
      obs error:
        covariance model: diagonal
      obs filters:
      - filter: PreQC
        maxvalue: 3
      - filter: Domain Check
        where:
        - variable:
            name: MetaData/sensorZenithAngle
          maxvalue: 65.0
      - filter: Background Check
        apply at iterations: 0,1
        threshold: 10
      obs operator: &crtm_amsua_metopc
        name: CRTM
        Absorbers: [H2O,O3]
        SurfaceWindGeoVars: uv
        linear obs operator:
          Absorbers: [H2O]
        obs options:
          Sensor_ID: amsua_metop-c
          EndianType: little_endian
          CoefficientPath: ./crtm3/

    - obs space:
        name: Radar_Reflectivity
        obsdatain:
          engine:
            type: H5File
            obsfile: ./obs_radar_cptec_#ANADATE#00.h5
        obsdataout:
          engine:
            type: H5File
            obsfile: ./hofx-mpas.obs_radar_cappi_#ANADATE#00.h5
        simulated variables: [reflectivity]
      geovals:
        filename: ./geovals-obs_radar_cappi_#ANADATE#00.h5
      vector ref: TestReference
      tolerance: 1.e-6
      obs operator:
        name: DirectZDA
        microphysics option: GFDL
        use variational method: false
        vertical coordinate: geopotential_height
        var_rain_mixing_ratio: rain_water
        var_snow_mixing_ratio: snow_water
        var_graupel_mixing_ratio: graupel

output:
  filename: "./an.$Y-$M-$DT$h.$m.$s.nc"
  stream name: analysis
variational:
  minimizer:
    algorithm: DRPCG
  iterations:
  - geometry:
      nml_file: "./namelist.atmosphere"
      streams_file: "./streams.atmosphere"
    ninner: '50'
    gradient norm reduction: 1e-10
    test: 'on'
    diagnostics:
      departures: ombg
  - geometry:
      nml_file: "./namelist.atmosphere"
      streams_file: "./streams.atmosphere"
    ninner: '50'
    gradient norm reduction: 1e-10
    test: 'on'
final:
  diagnostics:
    departures: oman
  increment: # total increment
    geometry:
      nml_file: "./namelist.atmosphere"
      streams_file: "./streams.atmosphere"
      deallocate non-da fields: true
    output:
      state component:
        filename: "./mpas.3dvar.inc.$Y-$M-$DT$h.$m.$s.nc"
        stream name: control
